name: DevSecOps AWS Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: devsecops-app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 📥 Checkout code
    - name: Checkout
      uses: actions/checkout@v4

    # 🐞 Debug Docker username (temporary - helps troubleshooting)
    - name: Debug Docker Username
      run: echo "Docker user is ${{ secrets.DOCKER_USER }}"

    # 🔐 Install Trivy (stable method)
    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install -y wget gnupg lsb-release
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install -y trivy

    # 🔍 Scan source code
    - name: Scan Filesystem
      run: |
        trivy fs . --severity HIGH,CRITICAL --exit-code 1

    # 🐳 Build Docker Image
    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USER }}/${{ env.IMAGE_NAME }}:latest .

    # 🔍 Scan Docker Image
    - name: Scan Docker Image
      run: |
        trivy image ${{ secrets.DOCKER_USER }}/${{ env.IMAGE_NAME }}:latest --severity HIGH,CRITICAL --exit-code 1

    # 🔐 Login to DockerHub
    - name: Docker Login
      run: |
        echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

    #  Push Docker Image
    - name: Push Image
      run: |
        docker push ${{ secrets.DOCKER_USER }}/${{ env.IMAGE_NAME }}:latest
