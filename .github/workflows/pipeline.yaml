name: DevSecOps AWS Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: devsecops-app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    # Install Trivy
    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install -y wget
        wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.0_Linux-64bit.deb
        sudo dpkg -i trivy_0.50.0_Linux-64bit.deb

    # Scan Code
    - name: Scan Filesystem
      run: trivy fs . --exit-code 1 --severity HIGH,CRITICAL

    # Build Image
    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKER_USER }}/${{ env.IMAGE_NAME }}:latest .

    # Scan Image
    - name: Scan Image
      run: trivy image ${{ secrets.DOCKER_USER }}/${{ env.IMAGE_NAME }}:latest --exit-code 1

    # Push Image
    - name: Docker Login
      run: echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

    - name: Push Image
      run: docker push ${{ secrets.DOCKER_USER }}/${{ env.IMAGE_NAME }}:latest
